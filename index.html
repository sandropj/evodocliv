<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Portal Clínico Metabólico</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<header>
<h1>Painel Clínico Metabólico</h1>
</header>

<div class="card">

<h2>Prontuário</h2>

<label>Nome</label>
<input id="nome">

<label>Data nascimento</label>
<input type="date" id="nascimento">

<label>Condição principal</label>
<input id="condicao">

<button onclick="salvarProntuario()">Salvar prontuário</button>

</div>

<div class="card">

<h2>Registro Clínico</h2>

<label>Data</label>
<input type="date" id="data">

<label>Peso</label>
<input type="number" id="peso">

<label>IMC</label>
<input type="number" id="imc">

<button onclick="salvarRegistro()">Salvar registro</button>

</div>

<div class="card">

<h2>Exames laboratoriais</h2>

<label>Glicose</label>
<input type="number" id="glicose">

<label>PCR</label>
<input type="number" id="pcr">

<button onclick="salvarExame()">Salvar exame</button>

</div>

<div class="card">

<h2>Painel metabólico</h2>

<div id="painelMetabolico"></div>

</div>

<div class="card">

<h2>Evolução clínica</h2>

<canvas id="pesoChart"></canvas>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
