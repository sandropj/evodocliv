<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EvoDocLiv - Painel Clínico</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>EvoDocLiv</h2>

<ul>

<li>Dashboard</li>
<li>Paciente</li>
<li>Registros</li>
<li>Exames</li>
<li>Gráficos</li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<header>

<h1>Painel Metabólico</h1>

</header>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h3>Peso</h3>
<p id="pesoAtual">-- kg</p>

</div>

<div class="card">

<h3>IMC</h3>
<p id="imcAtual">--</p>

</div>

<div class="card">

<h3>Disposição</h3>
<p id="dispAtual">--</p>

</div>

</div>

<!-- REGISTRO -->

<div class="registro">

<h2>Registro diário</h2>

<input type="date" id="data">

<input type="number" placeholder="Peso" id="peso">

<input type="number" placeholder="IMC" id="imc">

<input type="range" min="0" max="10" id="disposicao">

<button onclick="salvar()">Salvar</button>

</div>

<!-- GRÁFICO -->

<div class="grafico">

<canvas id="pesoChart"></canvas>

</div>

</div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
